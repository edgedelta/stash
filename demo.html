<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo - EdgeDelta GitHub Pages</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem;
        }
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        nav a {
            color: #00d4ff;
            text-decoration: none;
        }
        nav a:hover {
            color: #fff;
        }
        h1 {
            font-size: 2.5rem;
            margin: 2rem 0;
            text-align: center;
        }
        .demo-section {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 2rem;
            margin: 2rem 0;
        }
        .demo-section h2 {
            color: #00d4ff;
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
        }
        .counter {
            display: flex;
            align-items: center;
            gap: 1rem;
            justify-content: center;
        }
        .counter button {
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            border: none;
            color: #fff;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-size: 1.25rem;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }
        .counter button:hover {
            transform: scale(1.05);
        }
        .counter button:active {
            transform: scale(0.95);
        }
        .counter span {
            font-size: 3rem;
            min-width: 100px;
            text-align: center;
        }
        .color-demo {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        .color-box {
            width: 80px;
            height: 80px;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.3s;
        }
        .color-box:hover {
            transform: scale(1.1) rotate(5deg);
        }
        .theme-display {
            text-align: center;
            margin-top: 1rem;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            font-family: monospace;
        }
        .metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
        }
        .metric {
            background: rgba(0, 0, 0, 0.2);
            padding: 1.5rem;
            border-radius: 8px;
            text-align: center;
        }
        .metric-value {
            font-size: 2rem;
            color: #00d4ff;
            font-weight: bold;
        }
        .metric-label {
            color: #888;
            margin-top: 0.5rem;
            font-size: 0.875rem;
        }
        .typing-demo {
            font-family: monospace;
            background: #0d0d1a;
            padding: 1.5rem;
            border-radius: 8px;
            font-size: 1.1rem;
            min-height: 60px;
        }
        .cursor {
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
        footer {
            text-align: center;
            margin-top: 3rem;
            padding: 2rem;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <nav>
            <a href="index.html">&larr; Back to Home</a>
            <span>Demo Page</span>
        </nav>

        <h1>Interactive Demo</h1>

        <div class="demo-section">
            <h2>Counter</h2>
            <div class="counter">
                <button onclick="updateCounter(-1)">-</button>
                <span id="counter">0</span>
                <button onclick="updateCounter(1)">+</button>
            </div>
        </div>

        <div class="demo-section">
            <h2>Color Picker</h2>
            <div class="color-demo">
                <div class="color-box" style="background: #00d4ff;" onclick="selectColor('#00d4ff')"></div>
                <div class="color-box" style="background: #7b2cbf;" onclick="selectColor('#7b2cbf')"></div>
                <div class="color-box" style="background: #00ff88;" onclick="selectColor('#00ff88')"></div>
                <div class="color-box" style="background: #ff6b6b;" onclick="selectColor('#ff6b6b')"></div>
                <div class="color-box" style="background: #ffd93d;" onclick="selectColor('#ffd93d')"></div>
            </div>
            <div class="theme-display" id="colorDisplay">Click a color above</div>
        </div>

        <div class="demo-section">
            <h2>Live Metrics</h2>
            <div class="metrics">
                <div class="metric">
                    <div class="metric-value" id="metric1">0</div>
                    <div class="metric-label">Requests/sec</div>
                </div>
                <div class="metric">
                    <div class="metric-value" id="metric2">0</div>
                    <div class="metric-label">Latency (ms)</div>
                </div>
                <div class="metric">
                    <div class="metric-value" id="metric3">0%</div>
                    <div class="metric-label">CPU Usage</div>
                </div>
                <div class="metric">
                    <div class="metric-value" id="metric4">0</div>
                    <div class="metric-label">Active Users</div>
                </div>
            </div>
        </div>

        <div class="demo-section">
            <h2>Typing Animation</h2>
            <div class="typing-demo">
                <span id="typingText"></span><span class="cursor">|</span>
            </div>
        </div>

        <footer>
            <p>GitHub Pages Demo | <a href="index.html" style="color: #00d4ff;">Back to Home</a></p>
        </footer>
    </div>

    <script>
        // Counter
        let count = 0;
        function updateCounter(delta) {
            count += delta;
            document.getElementById('counter').textContent = count;
        }

        // Color picker
        function selectColor(color) {
            document.getElementById('colorDisplay').textContent = `Selected: ${color}`;
            document.getElementById('colorDisplay').style.borderLeft = `4px solid ${color}`;
        }

        // Live metrics simulation
        function updateMetrics() {
            document.getElementById('metric1').textContent = Math.floor(Math.random() * 1000 + 500);
            document.getElementById('metric2').textContent = Math.floor(Math.random() * 50 + 10);
            document.getElementById('metric3').textContent = Math.floor(Math.random() * 40 + 20) + '%';
            document.getElementById('metric4').textContent = Math.floor(Math.random() * 200 + 50);
        }
        setInterval(updateMetrics, 2000);
        updateMetrics();

        // Typing animation
        const messages = [
            'Welcome to EdgeDelta GitHub Pages...',
            'Observability at the edge...',
            'Real-time data processing...',
            'Powered by GitHub Actions...'
        ];
        let msgIndex = 0;
        let charIndex = 0;
        const typingEl = document.getElementById('typingText');

        function type() {
            if (charIndex < messages[msgIndex].length) {
                typingEl.textContent += messages[msgIndex].charAt(charIndex);
                charIndex++;
                setTimeout(type, 50);
            } else {
                setTimeout(erase, 2000);
            }
        }

        function erase() {
            if (charIndex > 0) {
                typingEl.textContent = messages[msgIndex].substring(0, charIndex - 1);
                charIndex--;
                setTimeout(erase, 30);
            } else {
                msgIndex = (msgIndex + 1) % messages.length;
                setTimeout(type, 500);
            }
        }

        type();
    </script>
</body>
</html>
